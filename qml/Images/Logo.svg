    <path d="M 120 60 C 80 150, 50 250, 40 324" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="butt"/>
    
    <path d="M 120 60 C 80 150, 50 250, 40 324 L 130 60 Z" fill="#FFFFFF" fill-opacity="0.1"/>

